<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Leitor de Código de Barras</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: #111827;
    padding: 30px;
    border-radius: 12px;
    width: 600px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0 15px 0;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1d4ed8;
}

.result {
    margin-top: 20px;
    background: #1f2937;
    padding: 15px;
    border-radius: 8px;
}

.label {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
    <h2>Leitor de Etiqueta</h2>

    <label>Código Barras Etiqueta:</label>
    <input type="text" id="codigo">

    <label>Início Cod Produto:</label>
    <input type="number" id="iniProd">

    <label>Tamanho Cod Produto:</label>
    <input type="number" id="tamProd">

    <label>Início Preço Produto:</label>
    <input type="number" id="iniPreco">

    <label>Tamanho Preço Produto:</label>
    <input type="number" id="tamPreco">

    <button onclick="processar()">Processar</button>

    <div class="result">
        <div><span class="label">Código Produto:</span> <span id="resProd">-</span></div>
        <div><span class="label">Preço Produto:</span> <span id="resPreco">-</span></div>
    </div>
</div>

<script>
function processar() {

    let codigo = document.getElementById("codigo").value;

    let iniProd = parseInt(document.getElementById("iniProd").value);
    let tamProd = parseInt(document.getElementById("tamProd").value);

    let iniPreco = parseInt(document.getElementById("iniPreco").value);
    let tamPreco = parseInt(document.getElementById("tamPreco").value);

    if(!codigo || isNaN(iniProd) || isNaN(tamProd) || isNaN(iniPreco) || isNaN(tamPreco)){
        alert("Preencha todos os campos corretamente.");
        return;
    }

    // 🔴 VALIDAÇÃO NOVA
    if ((iniProd - 1 + tamProd) > codigo.length) {
        alert("TAMANHO INVALIDO - EXCEDE POSIÇÃO INICIO (CÓDIGO PRODUTO)");
        return;
    }

    if ((iniPreco - 1 + tamPreco) > codigo.length) {
        alert("TAMANHO INVALIDO - EXCEDE POSIÇÃO INICIO (PREÇO)");
        return;
    }

    let codProduto = codigo.substr(iniProd - 1, tamProd);
    let precoBruto = codigo.substr(iniPreco - 1, tamPreco);

    let precoFormatado = precoBruto.slice(0, -2) + "," + precoBruto.slice(-2);

    document.getElementById("resProd").innerText = codProduto;
    document.getElementById("resPreco").innerText = precoFormatado;
}
</script>

</body>
</html>
