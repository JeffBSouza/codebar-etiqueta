<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Leitor de Código de Barras</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: #111827;
    padding: 30px;
    border-radius: 12px;
    width: 650px;
    box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.header h2 {
    margin: 0;
}

.versao {
    font-size: 12px;
    opacity: 0.7;
}

.linha {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
}

.linha label {
    width: 260px;
    font-size: 14px;
}

.linha input {
    flex: 1;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    background: #1d4ed8;
}

.result {
    margin-top: 20px;
    background: #1f2937;
    padding: 15px;
    border-radius: 8px;
}

.label {
    font-weight: bold;
}
</style>
</head>

<body>

<div class="card">
    <div class="header">
        <h2>Leitor de Etiqueta</h2>
        <span class="versao">v3</span>
    </div>

    <div class="linha">
        <label>Código Barras Etiqueta:</label>
        <input type="text" id="codigo">
    </div>

    <div class="linha">
        <label>Informe o Código do Produto:</label>
        <input type="text" id="codInformado">
    </div>

    <div class="linha">
        <label>Início Cod Produto:</label>
        <input type="number" id="iniProd">
    </div>

    <div class="linha">
        <label>Tamanho Cod Produto:</label>
        <input type="number" id="tamProd">
    </div>

    <div class="linha">
        <label>Início Preço/Peso Produto:</label>
        <input type="number" id="iniPreco">
    </div>

    <div class="linha">
        <label>Tamanho Preço/Peso Produto:</label>
        <input type="number" id="tamPreco">
    </div>

    <button onclick="processar()">Processar</button>

    <div class="result">
        <div><span class="label">Código Produto da etiqueta:</span> <span id="resProd">-</span></div>
        <div><span class="label">Preço/Peso Produto da etiqueta:</span> <span id="resPreco">-</span></div>
        <div><span class="label">Código Item informado:</span> <span id="resCodInf">-</span></div>
    </div>
</div>

<script>
function processar() {

    let codigo = document.getElementById("codigo").value;
    let codInformado = document.getElementById("codInformado").value;

    let iniProd = parseInt(document.getElementById("iniProd").value);
    let tamProd = parseInt(document.getElementById("tamProd").value);

    let iniPreco = parseInt(document.getElementById("iniPreco").value);
    let tamPreco = parseInt(document.getElementById("tamPreco").value);

    if(!codigo || isNaN(iniProd) || isNaN(tamProd) || isNaN(iniPreco) || isNaN(tamPreco)){
        alert("Preencha todos os campos corretamente.");
        return;
    }

    // 🔴 VALIDAÇÕES DE TAMANHO
    if ((iniProd - 1 + tamProd) > codigo.length) {
        alert("TAMANHO INVALIDO - EXCEDE POSIÇÃO INICIO (CÓDIGO PRODUTO)");
        return;
    }

    if ((iniPreco - 1 + tamPreco) > codigo.length) {
        alert("TAMANHO INVALIDO - EXCEDE POSIÇÃO INICIO (PREÇO)");
        return;
    }

    let codProduto = codigo.substr(iniProd - 1, tamProd);
    let precoBruto = codigo.substr(iniPreco - 1, tamPreco);

    let precoFormatado = precoBruto.slice(0, -2) + "," + precoBruto.slice(-2);

    // 🔵 REMOVER ZEROS À ESQUERDA PARA COMPARAÇÃO
    let codProdutoNormalizado = codProduto.replace(/^0+/, '');
    let codInformadoNormalizado = codInformado.replace(/^0+/, '');

    // 🔴 VALIDAÇÃO DE DIFERENÇA
    if (codProdutoNormalizado !== codInformadoNormalizado) {
        alert("Codigo Prod da etiqueta diferente do código informado");
    }

    document.getElementById("resProd").innerText = codProduto;
    document.getElementById("resPreco").innerText = precoFormatado;
    document.getElementById("resCodInf").innerText = codInformado;
}
</script>

</body>
</html>
